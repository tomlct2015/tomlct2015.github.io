<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCW Work Tool</title>

    <link rel="icon" type="image/svg+xml" href="ccw图标.svg">
    <link rel="alternate icon" type="image/png" href="ccw图标.svg">
    <link rel="shortcut icon" href="ccw图标.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 46, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(15, 52, 96, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .step {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(40, 40, 58, 0.6);
            border-radius: 10px;
            border-left: 4px solid #667eea;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .step h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: rgba(40, 40, 58, 0.4);
            border: 2px dashed #667eea;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #e0e0e0;
        }

        .file-input-label:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .file-input-label .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .extension-list {
            margin-top: 20px;
        }

        .extension-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(40, 40, 58, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .extension-item:hover {
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .extension-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .extension-item label {
            flex: 1;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .extension-item .url {
            color: #667eea;
            word-break: break-all;
        }

        .extension-item .type {
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(60, 60, 80, 0.8);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(80, 80, 100, 0.9);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(40, 167, 69, 0.2);
            color: #4ade80;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .status.error {
            display: block;
            background: rgba(220, 53, 69, 0.2);
            color: #f87171;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .status.info {
            display: block;
            background: rgba(23, 162, 184, 0.2);
            color: #38bdf8;
            border: 1px solid rgba(23, 164, 184, 0.3);
        }

        .progress {
            margin-top: 20px;
            display: none;
        }

        .progress.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(40, 40, 58, 0.6);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h4 {
            color: #fbbf24;
            margin-bottom: 10px;
        }

        .info-box ul {
            margin-left: 20px;
            color: #fcd34d;
        }

        .info-box li {
            margin-bottom: 5px;
        }
        
        /* 输入框样式 */
        input[type="text"], input[type="file"] {
            background: rgba(40, 40, 58, 0.6) !important;
            color: #e0e0e0 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        
        input[type="text"]:focus {
            border-color: #667eea !important;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3) !important;
            outline: none;
        }
        
        /* 复选框样式 */
        input[type="checkbox"] {
            accent-color: #667eea;
        }
    </style>
</head>

            <p id="mainSubtitle">让Scratch项目能被更方便的处理</p>
            <div style="margin-top: 20px;">
                <select id="languageSelector" style="padding: 8px 15px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 14px; cursor: pointer; backdrop-filter: blur(5px);">
                    <option value="en">🇬🇧 English</option>
                    <option value="zh">🇨🇳 中文</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="hi">🇮🇳 हिन्दी</option>
                    <option value="ar">🇸🇦 العربية</option>
                </select>

        <div class="content">
            <div class="info-box">
                <h4 id="usageTitle">📋 使用说明</h4>
                <ul id="usageList">
                    <li>上传你的.sb3项目文件</li>
                    <li>工具会自动检测项目内容</li>
                    <li>选择操作模式</li>
                    <li>选择要操作的内容</li>
                    <li>点击“执行并下载”修复后的新的.sb3文件</li>
                </ul>
            </div>

            <!-- 步骤1：上传文件 -->
            <div class="step">
                <h3 id="step1Title">📁 步骤1：上传SB3文件</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="sb3File" accept=".sb3">
                    <label for="sb3File" class="file-input-label">
                        <div class="icon">📦</div>
                        <div id="uploadText">点击或拖拽上传.sb3文件</div>
                    </label>
                </div>
            </div>

            <!-- 步骤2：选择操作模式 -->
            <div class="step" id="modeStep" style="display: none;">
                <h3 id="step2Title">⚙️ 步骤2：选择操作模式</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" id="modeDelete" onclick="setMode('delete')" style="flex: 1; min-width: 120px;">
                        🌀 <span id="modeDeleteText">更新扩展</span>
                    </button>
                    <button class="btn btn-secondary" id="modeReplaceURL" onclick="setMode('replaceURL')" style="flex: 1; min-width: 120px;">
                        🔗 <span id="modeReplaceURLText">替换扩展链接</span>
                    </button>
                    <button class="btn btn-secondary" id="modeReplaceID" onclick="setMode('replaceID')" style="flex: 1; min-width: 120px;">
                        🆔 <span id="modeReplaceIDText">替换扩展ID</span>
                    </button>
                    <button class="btn btn-secondary" id="modeConvertTW" onclick="setMode('convertTW')" style="flex: 1; min-width: 150px;">
                        🔄 <span id="modeConvertTWText">Gandi转TurboWarp</span>
                    </button>
                </div>
                
                <!-- 替换链接输入框 -->
                <div id="replaceURLInput" style="display: none;">
                    <label id="newURLLabel" style="display: block; margin-bottom: 8px; font-weight: 600;">🔗 新的扩展链接：</label>
                    <input type="text" id="newURL" placeholder="https://example.com/new-extension.js" 
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                </div>
                
                <!-- 替换ID输入框 -->
                <div id="replaceIDInput" style="display: none;">
                    <label id="newIDLabel" style="display: block; margin-bottom: 8px; font-weight: 600;">🆔 新的扩展ID：</label>
                    <input type="text" id="newID" placeholder="myExtension"

        let currentLanguage = 'en';

        // 切换语言
        function switchLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];
            
            // 更新标题和副标题
            document.getElementById('mainTitle').textContent = t.title;
            document.getElementById('mainSubtitle').textContent = t.subtitle;
            
            // 更新使用说明
            document.getElementById('usageTitle').textContent = t.usageTitle;
            const usageList = document.getElementById('usageList');
            usageList.innerHTML = '';
            t.usageList.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                usageList.appendChild(li);
            });
            
            // 更新步骤标题
            document.getElementById('step1Title').textContent = t.step1Title;
            document.getElementById('uploadText').textContent = t.uploadText;
            document.getElementById('step2Title').textContent = t.step2Title;
            document.getElementById('step3Title').textContent = t.step3Title;
            document.getElementById('step4Title').textContent = t.step4Title;
            
            // 更新按钮文本
            document.getElementById('modeDeleteText').textContent = t.modeDelete;
            document.getElementById('modeReplaceURLText').textContent = t.modeReplaceURL;
            document.getElementById('modeReplaceIDText').textContent = t.modeReplaceID;
            document.getElementById('modeConvertTWText').textContent = t.modeConvertTW;
            document.getElementById('selectAllBtn').textContent = t.selectAll;
            document.getElementById('selectNoneBtn').textContent = t.selectNone;
            document.getElementById('executeBtnText').textContent = t.executeBtn;
            document.getElementById('debugBtnText').textContent = t.debugBtn;
            
            // 更新标签
            document.getElementById('newURLLabel').textContent = t.newURLLabel;
            document.getElementById('newIDLabel').textContent = t.newIDLabel;
            
            // RTL支持
            if (lang === 'ar') {
                document.body.style.direction = 'rtl';
            } else {
                document.body.style.direction = 'ltr';
            }
        }

        let projectData = null;
        let sb3File = null;
        let extensions = [];
        let currentMode = 'delete'; // delete, replaceURL, replaceID

        // 文件上传处理
        document.getElementById('sb3File').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showStatus('info', t('readingFile'));
            
            try {
                sb3File = file;
                const zip = await JSZip.loadAsync(file);
                
                if (!zip.file('project.json')) {
                    throw new Error('无效的SB3文件：缺少project.json');
                }

                const projectJson = await zip.file('project.json').async('string');
                projectData = JSON.parse(projectJson);

                showStatus('success', t('fileReadSuccess'));
                
                // 检测扩展
                detectExtensions();
                
            } catch (error) {
                showStatus('error', '❌ ' + error.message);
            }
        });

        // 检测扩展
        function detectExtensions() {
            extensions = [];

            // 1. 从 gandi.wildExtensions 获取
            if (projectData.gandi && projectData.gandi.wildExtensions) {
                const wildExts = projectData.gandi.wildExtensions;
                if (Array.isArray(wildExts)) {
                    wildExts.forEach(ext => {
                        if (typeof ext === 'string') {
                            extensions.push({
                                id: ext,
                                url: ext,
                                type: 'wildExtension',
                                platform: 'Gandi',
                                isCCW: false,
                                selected: true
                            });
                        } else if (typeof ext === 'object') {
                            const url = ext.url || ext.extensionURL || ext.id || '';
                            if (url) {
                                extensions.push({
                                    id: ext.id || url,
                                    url: url,
                                    type: 'wildExtension',
                                    platform: 'Gandi',
                                    isCCW: url.includes('ccw.site'),
                                    selected: true,
                                    rawData: ext
                                });
                            }
                        }
                    });
                } else if (typeof wildExts === 'object') {
                    Object.keys(wildExts).forEach(key => {
                        const value = wildExts[key];
                        const url = typeof value === 'string' ? value : (value.url || value.extensionURL || key);
                        extensions.push({
                            id: key,
                            url: url,
                            type: 'wildExtension',
                            platform: 'Gandi',
                            isCCW: url.includes('ccw.site'),
                            selected: true,
                            rawData: typeof value === 'object' ? value : null
                        });
                    });
                }
            }

            // 2. 从 extensionURLs 获取（支持对象和数组两种格式）
            if (projectData.extensionURLs) {
                if (Array.isArray(projectData.extensionURLs)) {
                    projectData.extensionURLs.forEach(url => {
                        const exists = extensions.some(ext => ext.url === url);
                        if (!exists) {
                            extensions.push({
                                id: url,
                                url: url,
                                type: 'extensionURL',
                                platform: url.includes('ccw.site') ? 'CCW' : 'Other',
                                isCCW: url.includes('ccw.site'),
                                selected: true
                            });
                        }
                    });
                } else if (typeof projectData.extensionURLs === 'object') {
                    Object.keys(projectData.extensionURLs).forEach(id => {
                        const url = projectData.extensionURLs[id];
                        const exists = extensions.some(ext => ext.url === url || ext.id === id);
                        if (!exists) {
                            extensions.push({
                                id: id,
                                url: url,
                                type: 'extensionURL',
                                platform: url.includes('ccw.site') ? 'CCW' : 'Other',
                                isCCW: url.includes('ccw.site'),
                                selected: true
                            });
                        }
                    });
                }
            }

            if (extensions.length === 0) {
                showStatus('info', t('noExtensions'));
                return;
            }

            showStatus('success', t('detectedExtensions', { count: extensions.length }));
            
            // 显示扩展列表
            displayExtensions();
            document.getElementById('modeStep').style.display = 'block';
            document.getElementById('extensionStep').style.display = 'block';
            document.getElementById('downloadStep').style.display = 'block';
        }

        // 设置操作模式
        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮样式
            document.getElementById('modeDelete').style.background = mode === 'delete' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#6c757d';
            document.getElementById('modeReplaceURL').style.background = mode === 'replaceURL' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#6c757d';
            document.getElementById('modeReplaceID').style.background = mode === 'replaceID' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#6c757d';
            document.getElementById('modeConvertTW').style.background = mode === 'convertTW' ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#6c757d';
            
            // 显示/隐藏输入框
            document.getElementById('replaceURLInput').style.display = mode === 'replaceURL' ? 'block' : 'none';
            document.getElementById('replaceIDInput').style.display = mode === 'replaceID' ? 'block' : 'none';
            
            // Gandi转TurboWarp模式：隐藏扩展列表，直接转换
            if (mode === 'convertTW') {
                document.getElementById('extensionStep').style.display = 'none';
                showStatus('info', t('convertTWInfo'));
            } else {
                document.getElementById('extensionStep').style.display = 'block';
                // 重新渲染扩展列表（根据模式过滤）
                displayExtensions();
            }
        }

        // 显示扩展列表
        function displayExtensions() {
            const list = document.getElementById('extensionList');
            list.innerHTML = '';

            extensions.forEach((ext, index) => {
                // 过滤逻辑：非CCW扩展在更新模式下不显示
                if (currentMode === 'delete' && !ext.isCCW) {
                    return; // 跳过显示
                }

                const item = document.createElement('div');
                item.className = 'extension-item';
                
                // 显示内容逻辑
                let displayText = '';
                let typeText = '';
                
                if (ext.type === 'wildExtension') {
                    // Gandi扩展：显示ID，标签为Gandi
                    displayText = ext.id;
                    typeText = 'Gandi';
                } else {
                    // extensionURL类型：也显示ID
                    displayText = ext.id;
                    typeText = ext.platform || 'URL';
                }
                
                item.innerHTML = `
                    <input type="checkbox" id="ext${index}" checked onchange="updateExtension(${index}, this.checked)">
                    <label for="ext${index}">
                        <span class="url">${displayText}</span>
                    </label>
                    <span class="type">${typeText}</span>
                `;
                list.appendChild(item);
            });
        }

        // 更新扩展选择状态
        function updateExtension(index, selected) {
            extensions[index].selected = selected;
        }

        // 全选/全不选
        function selectAll(selected) {
            extensions.forEach(ext => ext.selected = selected);
            document.querySelectorAll('#extensionList input[type="checkbox"]').forEach(cb => {
                cb.checked = selected;
            });
        }

        // 执行并下载
        async function executeAndDownload() {
            // Gandi转TurboWarp模式不需要选择扩展
            let selectedExtensions = [];
            if (currentMode !== 'convertTW') {
                selectedExtensions = extensions.filter(ext => ext.selected);
                
                if (selectedExtensions.length === 0) {
                    showStatus('error', t('selectAtLeastOne'));
                    return;
                }
            }
            
            // 验证输入
            let newURL = '';
            let newID = '';
            
            if (currentMode === 'replaceURL') {
                newURL = document.getElementById('newURL').value.trim();
                if (!newURL) {
                    showStatus('error', t('enterNewURL'));
                    return;
                }
            }
            
            if (currentMode === 'replaceID') {
                newID = document.getElementById('newID').value.trim();
                if (!newID) {
                    showStatus('error', t('enterNewID'));
                    return;
                }
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true;

            showProgress(true);
            updateProgress(10, t('processing'));

            try {
                // 1. 创建新的ZIP
                updateProgress(20, t('creatingFile'));
                const newZip = new JSZip();

                // 2. 复制所有文件（除了project.json）
                const originalZip = await JSZip.loadAsync(sb3File);
                const files = Object.keys(originalZip.files);
                
                for (let i = 0; i < files.length; i++) {
                    const fileName = files[i];
                    if (fileName !== 'project.json') {
                        const fileData = await originalZip.files[fileName].async('uint8array');
                        newZip.file(fileName, fileData);
                    }
                    
                    if (i % 10 === 0) {
                        updateProgress(20 + (i / files.length) * 30, t('copyingFiles', { i: i, total: files.length }));
                    }
                }

                updateProgress(50, t('updatingConfig'));

                // 3. 修改project.json
                const updatedProject = JSON.parse(JSON.stringify(projectData));
                
                // 根据模式执行不同操作
                if (currentMode === 'delete') {
                    // 模式1：删除扩展
                    deleteExtensions(updatedProject, selectedExtensions);
                } else if (currentMode === 'replaceURL') {
                    // 模式2：替换链接
                    replaceExtensionURLs(updatedProject, selectedExtensions, newURL);
                } else if (currentMode === 'replaceID') {
                    // 模式3：替换ID
                    replaceExtensionIDs(updatedProject, selectedExtensions, newID);
                } else if (currentMode === 'convertTW') {
                    // 模式4：Gandi转TurboWarp（带扩展链接替换）
                    await convertToTurboWarpWithExtensions(updatedProject);
                }

                updateProgress(70, t('savingData'));
                
                // 调试：输出修改后的配置
                console.log('=== 修改后的扩展配置 ===');
                console.log('extensions:', updatedProject.extensions);
                console.log('extensionURLs:', updatedProject.extensionURLs);
                console.log('gandi.wildExtensions:', updatedProject.gandi?.wildExtensions);
                console.log('========================');
                
                // 显示详细的JSON内容（方便调试）
                const debugInfo = {
                    extensions: updatedProject.extensions,
                    extensionURLs: updatedProject.extensionURLs,
                    gandi: updatedProject.gandi
                };
                console.log('完整JSON配置:', JSON.stringify(debugInfo, null, 2));

                // 4. 添加修改后的project.json
                newZip.file('project.json', JSON.stringify(updatedProject, null, 2));

                updateProgress(80, '正在生成SB3文件...');

                // 5. 生成新的SB3文件
                const newSb3Blob = await newZip.generateAsync({
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                }, (metadata) => {
                    updateProgress(80, t('generatingFile', { percent: Math.round(metadata.percent) }));
                });

                updateProgress(100, t('complete'));

                // 6. 下载文件
                const fileName = sb3File.name.replace('.sb3', '_updated.sb3');
                const url = URL.createObjectURL(newSb3Blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                let successMsg = '';
                if (currentMode === 'delete') {
                    successMsg = t('deleteSuccess', { fileName: fileName, count: selectedExtensions.length });
                } else if (currentMode === 'replaceURL') {
                    successMsg = t('replaceURLSuccess', { fileName: fileName, count: selectedExtensions.length });
                } else if (currentMode === 'replaceID') {
                    successMsg = t('replaceIDSuccess', { fileName: fileName, count: selectedExtensions.length });
                } else if (currentMode === 'convertTW') {
                    successMsg = t('convertSuccess', { fileName: fileName });
                }
                
                showStatus('success', successMsg);

            } catch (error) {
                showStatus('error', t('updateFailed') + error.message);
                console.error(error);
            } finally {
                btn.disabled = false;
                setTimeout(() => showProgress(false), 1000);
            }
        }

        // 显示状态
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
        }
        
        // 获取翻译消息
        function t(key, params = {}) {
            const messages = translations[currentLanguage];
            let msg = messages[key] || key;
            // 替换参数
            for (const [k, v] of Object.entries(params)) {
                msg = msg.replace(`{${k}}`, v);
            }
            return msg;
        }

        // 显示/隐藏进度条
        function showProgress(show) {
            const progress = document.getElementById('progress');
            progress.className = show ? 'progress active' : 'progress';
        }

        // 更新进度
        function updateProgress(percent, message) {
            const fill = document.getElementById('progressFill');
            fill.style.width = percent + '%';
            fill.textContent = Math.round(percent) + '%';
            
            if (message) {
                showStatus('info', message);
            }
        }

        // 拖拽上传
        const fileLabel = document.querySelector('.file-input-label');
        
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = '#f0f4ff';
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = 'white';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = 'white';
            
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.sb3')) {
                document.getElementById('sb3File').files = e.dataTransfer.files;
                document.getElementById('sb3File').dispatchEvent(new Event('change'));
            } else {
                showStatus('error', t('uploadError'));
            }
        });
        
        // 下载调试信息
        function downloadDebugInfo() {
            if (!projectData) {
                showStatus('error', '❌ ' + t('uploadError'));
                return;
            }
            
            const debugData = {
                原始数据: {
                    extensions: projectData.extensions,
                    extensionURLs: projectData.extensionURLs,
                    gandi: projectData.gandi
                },
                说明: '这是原始的project.json配置，请上传.sb3文件并执行删除后，对比新生成的文件'
            };
            
            const blob = new Blob([JSON.stringify(debugData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'debug_info.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus('success', t('debugDownload'));
        }
        
        // ==================== 处理函数 ====================
        
        // 模式1：删除扩展
        function deleteExtensions(updatedProject, selectedExtensions) {
            // 收集所有要删除的ID
            const deletedIds = selectedExtensions.map(sel => sel.id);
            
            console.log('要删除的扩展ID:', deletedIds);
            
            // 1. 删除 extensions 数组中的ID
            if (updatedProject.extensions && Array.isArray(updatedProject.extensions)) {
                updatedProject.extensions = updatedProject.extensions.filter(extId => {
                    return !deletedIds.includes(extId);
                });
                console.log('删除后的extensions:', updatedProject.extensions);
            }
            
            // 2. 删除 extensionURLs
            if (updatedProject.extensionURLs) {
                if (Array.isArray(updatedProject.extensionURLs)) {
                    updatedProject.extensionURLs = updatedProject.extensionURLs.filter(url => {
                        return !selectedExtensions.some(sel => sel.url === url);
                    });
                } else if (typeof updatedProject.extensionURLs === 'object') {
                    Object.keys(updatedProject.extensionURLs).forEach(id => {
                        if (deletedIds.includes(id)) {
                            delete updatedProject.extensionURLs[id];
                        }
                    });
                }
                console.log('删除后的extensionURLs:', updatedProject.extensionURLs);
            }
            
            // 3. 删除 gandi.wildExtensions
            if (updatedProject.gandi && updatedProject.gandi.wildExtensions) {
                if (Array.isArray(updatedProject.gandi.wildExtensions)) {
                    updatedProject.gandi.wildExtensions = updatedProject.gandi.wildExtensions.filter(ext => {
                        if (typeof ext === 'string') {
                            return !deletedIds.includes(ext);
                        } else if (typeof ext === 'object' && ext.id) {
                            return !deletedIds.includes(ext.id);
                        }
                        return true;
                    });
                } else if (typeof updatedProject.gandi.wildExtensions === 'object') {
                    Object.keys(updatedProject.gandi.wildExtensions).forEach(key => {
                        if (deletedIds.includes(key)) {
                            delete updatedProject.gandi.wildExtensions[key];
                        }
                    });
                }
                console.log('删除后的gandi.wildExtensions:', updatedProject.gandi.wildExtensions);
            }
        }
        
        // 模式2：替换扩展链接
        function replaceExtensionURLs(updatedProject, selectedExtensions, newURL) {
            // 1. 替换 extensionURLs 中的URL
            if (updatedProject.extensionURLs) {
                if (Array.isArray(updatedProject.extensionURLs)) {
                    updatedProject.extensionURLs = updatedProject.extensionURLs.map(url => {
                        if (selectedExtensions.some(sel => sel.url === url)) {
                            return newURL;
                        }
                        return url;
                    });
                } else if (typeof updatedProject.extensionURLs === 'object') {
                    Object.keys(updatedProject.extensionURLs).forEach(id => {
                        const url = updatedProject.extensionURLs[id];
                        
                        if (selectedExtensions.some(sel => sel.id === id || sel.url === url)) {
                            updatedProject.extensionURLs[id] = newURL;
                        }
                    });
                }
            }
            
            // 2. 替换 gandi.wildExtensions 中的URL
            if (updatedProject.gandi && updatedProject.gandi.wildExtensions) {
                if (Array.isArray(updatedProject.gandi.wildExtensions)) {
                    updatedProject.gandi.wildExtensions = updatedProject.gandi.wildExtensions.map(ext => {
                        if (typeof ext === 'string' && selectedExtensions.some(sel => sel.url === ext)) {
                            return newURL;
                        } else if (typeof ext === 'object' && ext.url && selectedExtensions.some(sel => sel.url === ext.url)) {
                            ext.url = newURL;
                            if (ext.extensionURL) ext.extensionURL = newURL;
                        }
                        return ext;
                    });
                } else if (typeof updatedProject.gandi.wildExtensions === 'object') {
                    Object.keys(updatedProject.gandi.wildExtensions).forEach(key => {
                        const value = updatedProject.gandi.wildExtensions[key];
                        
                        if (typeof value === 'string' && selectedExtensions.some(sel => sel.url === value)) {
                            updatedProject.gandi.wildExtensions[key] = newURL;
                        } else if (typeof value === 'object' && value.url && selectedExtensions.some(sel => sel.url === value.url)) {
                            value.url = newURL;
                            if (value.extensionURL) value.extensionURL = newURL;
                        }
                    });
                }
            }
        }
        
        // 模式3：替换扩展ID
        function replaceExtensionIDs(updatedProject, selectedExtensions, newID) {
            // 1. 替换 extensions 数组中的ID
            if (updatedProject.extensions && Array.isArray(updatedProject.extensions)) {
                updatedProject.extensions = updatedProject.extensions.map(extId => {
                    if (selectedExtensions.some(sel => sel.id === extId)) {
                        return newID;
                    }
                    return extId;
                });
            }
            
            // 2. 替换 extensionURLs 中的键名
            if (updatedProject.extensionURLs && typeof updatedProject.extensionURLs === 'object' && !Array.isArray(updatedProject.extensionURLs)) {
                const newExtensionURLs = {};
                
                Object.keys(updatedProject.extensionURLs).forEach(id => {
                    if (selectedExtensions.some(sel => sel.id === id)) {
                        newExtensionURLs[newID] = updatedProject.extensionURLs[id];
                    } else {
                        newExtensionURLs[id] = updatedProject.extensionURLs[id];
                    }
                });
                
                updatedProject.extensionURLs = newExtensionURLs;
            }
            
            // 3. 替换 gandi.wildExtensions 中的键名
            if (updatedProject.gandi && updatedProject.gandi.wildExtensions && typeof updatedProject.gandi.wildExtensions === 'object' && !Array.isArray(updatedProject.gandi.wildExtensions)) {
                const newWildExtensions = {};
                
                Object.keys(updatedProject.gandi.wildExtensions).forEach(key => {
                    if (selectedExtensions.some(sel => sel.id === key)) {
                        newWildExtensions[newID] = updatedProject.gandi.wildExtensions[key];
                    } else {
                        newWildExtensions[key] = updatedProject.gandi.wildExtensions[key];
                    }
                });
                
                updatedProject.gandi.wildExtensions = newWildExtensions;
            }
        }
        
        // 模式4：Gandi转TurboWarp（删除所有Gandi属性）
        function convertToTurboWarp(updatedProject) {
            console.log('=== 开始Gandi转TurboWarp转换 ===');
            
            // 1. 删除 gandi 属性
            if (updatedProject.gandi) {
                console.log('删除 gandi 属性:', updatedProject.gandi);
                delete updatedProject.gandi;
            }
            
            // 2. 删除 extensionURLs（TurboWarp使用不同的扩展加载方式）
            if (updatedProject.extensionURLs) {
                console.log('删除 extensionURLs:', updatedProject.extensionURLs);
                delete updatedProject.extensionURLs;
            }
            
            // 3. 保留 extensions 数组（这是标准Scratch属性）
            console.log('保留 extensions 数组:', updatedProject.extensions);
            
            console.log('=== 转换完成 ===');
            console.log('转换后的项目配置:', JSON.stringify(updatedProject, null, 2));
        }
        
        // 模式5：Gandi转TurboWarp（带扩展链接替换）
        async function convertToTurboWarpWithExtensions(updatedProject) {
            console.log('=== 开始Gandi转TurboWarp转换（带扩展链接） ===');
            
            // 1. 检测Gandi自带扩展（在extensions数组中但不在extensionURLs中）
            const gandiExtensions = [];
            const extensionURLs = updatedProject.extensionURLs || {};
            
            if (updatedProject.extensions && Array.isArray(updatedProject.extensions)) {
                updatedProject.extensions.forEach(extId => {
                    // 跳过CCWSugar（这是CCW平台特有扩展，TurboWarp不需要）
                    if (extId === 'CCWSugar') {
                        console.log(`跳过CCWSugar扩展（CCW平台特有）`);
                        return;
                    }
                    
                    // 检查这个扩展是否有URL
                    const hasURL = extensionURLs[extId];
                    if (!hasURL) {
                        // 这是Gandi自带扩展，没有URL
                        gandiExtensions.push(extId);
                    }
                });
            }
            
            console.log('检测到Gandi自带扩展（无URL）:', gandiExtensions);
            
            // 2. 如果有Gandi自带扩展，让用户逐个提供链接
            if (gandiExtensions.length > 0) {
                const newExtensionURLs = {};
                
                for (const extId of gandiExtensions) {
                    const userURL = await promptForExtensionURL(extId);
                    if (userURL) {
                        newExtensionURLs[extId] = userURL;
                        console.log(`扩展 ${extId} 的链接: ${userURL}`);
                    } else {
                        console.log(`用户取消了扩展 ${extId} 的链接输入`);
                    }
                }
                
                // 更新extensionURLs
                if (Object.keys(newExtensionURLs).length > 0) {
                    updatedProject.extensionURLs = {
                        ...extensionURLs,
                        ...newExtensionURLs
                    };
                }
            }
            
            // 3. 删除 gandi 属性
            if (updatedProject.gandi) {
                console.log('删除 gandi 属性:', updatedProject.gandi);
                delete updatedProject.gandi;
            }
            
            console.log('=== 转换完成 ===');
            console.log('转换后的项目配置:', JSON.stringify(updatedProject, null, 2));
        }
        
        // 提示用户输入扩展链接
        function promptForExtensionURL(extId) {
            return new Promise((resolve) => {
                const url = prompt(
                    `检测到Gandi自带扩展: ${extId}\n\n` +
                    `这个扩展在TurboWarp中没有，请提供扩展链接：\n` +
                    `（例如: https://extensions.turbowarp.org/${extId}.js）\n\n` +
                    `如果不需要这个扩展，请点击“取消”`
                );
                resolve(url);
            });
        }
        
        // 语言选择器事件
        document.getElementById('languageSelector').addEventListener('change', (e) => {
            switchLanguage(e.target.value);
        });
        
        // 初始化 - 默认英语
        switchLanguage('en');
    </script>
