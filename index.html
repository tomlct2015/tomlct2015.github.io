<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCW - Cocreate World</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="ccw图标.svg">
    <link rel="alternate icon" type="image/png" href="ccw图标.svg">
    <link rel="shortcut icon" href="ccw图标.svg" type="image/svg+xml">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* 语言选择器 */
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .language-selector select {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            background: rgba(20, 20, 35, 0.9);
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .language-selector select:hover {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        /* 头部区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        .logo {
            font-size: 5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            font-size: 1.8em;
            color: #b0b0b0;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.2s backwards;
        }

        .description {
            font-size: 1.2em;
            color: #808080;
            max-width: 800px;
            margin: 0 auto 40px;
            line-height: 1.8;
            animation: fadeInUp 1s ease-out 0.4s backwards;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.6s backwards;
            max-width: 1000px;
            margin: 0 auto;
        }

        .btn {
            padding: 18px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-3px);
        }

        /* 特性区域 */
        .features {
            padding: 100px 20px;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        .section-title {
            text-align: center;
            font-size: 3em;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: rgba(30, 30, 46, 0.4);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
            background: rgba(30, 30, 46, 0.55);
        }

        .feature-card:hover::before {
            transform: scaleX(1);
        }

        .feature-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .feature-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .feature-desc {
            color: #b0b0b0;
            line-height: 1.8;
            font-size: 1em;
        }

        /* 扩展区域 */
        .extensions {
            padding: 100px 20px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
        }

        .extensions-desc {
            text-align: center;
            font-size: 1.2em;
            color: #b0b0b0;
            max-width: 800px;
            margin: -30px auto 60px;
            line-height: 1.8;
        }

        .extensions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .extension-card {
            background: rgba(30, 30, 46, 0.4);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(102, 126, 234, 0.25);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }

        .extension-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        .extension-card:hover {
            transform: translateY(-15px);
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.25);
            background: rgba(30, 30, 46, 0.55);
        }

        .extension-icon {
            font-size: 4em;
            margin-bottom: 20px;
            text-align: center;
        }

        .extension-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .extension-desc {
            color: #b0b0b0;
            line-height: 1.8;
            font-size: 1.05em;
            margin-bottom: 25px;
            text-align: center;
        }

        .extension-btn {
            display: block;
            width: 100%;
            text-align: center;
        }

        /* 数据统计 */
        .stats {
            padding: 100px 20px;
            background: rgba(20, 20, 35, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-card {
            text-align: center;
            padding: 30px;
            background: rgba(30, 30, 46, 0.35);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        }

        .stat-card:hover {
            transform: scale(1.05);
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(30, 30, 46, 0.5);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        /* 开发者区域 */
        .developer {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            position: relative;
            overflow: hidden;
        }
        .developer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #667eea 50%, transparent 100%);
        }
        .developer::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #764ba2 50%, transparent 100%);
        }
        .developer-badge {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 15px 35px;
            background: rgba(30, 30, 46, 0.45);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 15px;
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        }
        .developer-badge .dev-icon {
            font-size: 1.8em;
        }
        .developer-badge .dev-label {
            color: #808080;
            font-size: 0.95em;
        }
        .developer-link {
            color: #667eea;
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .developer-link:hover {
            -webkit-text-fill-color: transparent;
            filter: brightness(1.3);
            transform: scale(1.05);
        }
        .developer-subtitle {
            color: #606060;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* 作者区域 */
        .author {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        .author a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .author a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* 底部 */
        .footer {
            padding: 60px 20px;
            text-align: center;
            background: #0a0a0f;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .footer-text {
            color: #808080;
            font-size: 1em;
            margin-bottom: 8px;
        }

        .footer-credit {
            color: #606060;
            font-size: 0.9em;
        }

        /* 扩展开发帮助区域 */
        .dev-help {
            padding: 100px 20px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
            text-align: center;
        }

        .dev-help-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 0 auto;
        }

        .dev-help-btn {
            padding: 20px 40px;
            border-radius: 15px;
            background: rgba(30, 30, 46, 0.4);
            border: 2px solid rgba(102, 126, 234, 0.25);
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            flex: 1;
            min-width: 250px;
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        }

        .dev-help-btn:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.2);
            background: rgba(102, 126, 234, 0.15);
        }

        .dev-help-desc {
            color: #808080;
            font-size: 0.95em;
            margin-top: 8px;
        }

        /* 动画效果 */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .logo {
                font-size: 3em;
            }

            .tagline {
                font-size: 1.3em;
            }

            .section-title {
                font-size: 2em;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="language-selector">
        <select id="languageSelector">
            <option value="en">🇬🇧 English</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="es">🇪🇸 Español</option>
            <option value="hi">🇮🇳 हिन्दी</option>
            <option value="ar">🇸🇦 العربية</option>
        </select>
    </div>

    <!-- 头部区域 -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="logo" id="logo">CCW</h1>
            <p class="tagline" id="tagline">Creative Coding World</p>
            <p class="description" id="description">
