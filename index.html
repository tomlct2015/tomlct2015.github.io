    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 46, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(15, 52, 96, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .step {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(40, 40, 58, 0.6);
            border-radius: 10px;
            border-left: 4px solid #667eea;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .step h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: rgba(40, 40, 58, 0.4);
            border: 2px dashed #667eea;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #e0e0e0;
        }

        .file-input-label:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .file-input-label .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .extension-list {
            margin-top: 20px;
        }

        .extension-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(40, 40, 58, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .extension-item:hover {
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .extension-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .extension-item label {
            flex: 1;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .extension-item .url {
            color: #667eea;
            word-break: break-all;
        }

        .extension-item .type {
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(60, 60, 80, 0.8);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(80, 80, 100, 0.9);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(40, 167, 69, 0.2);
            color: #4ade80;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .status.error {
            display: block;
            background: rgba(220, 53, 69, 0.2);
            color: #f87171;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .status.info {
            display: block;
            background: rgba(23, 162, 184, 0.2);
            color: #38bdf8;
            border: 1px solid rgba(23, 164, 184, 0.3);
        }

        .progress {
            margin-top: 20px;
            display: none;
        }

        .progress.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(40, 40, 58, 0.6);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h4 {
            color: #fbbf24;
            margin-bottom: 10px;
        }

        .info-box ul {
            margin-left: 20px;
            color: #fcd34d;
        }

        .info-box li {
            margin-bottom: 5px;
        }
        
        /* 输入框样式 */
        input[type="text"], input[type="file"] {
            background: rgba(40, 40, 58, 0.6) !important;
            color: #e0e0e0 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        
        input[type="text"]:focus {
            border-color: #667eea !important;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3) !important;
            outline: none;
        }
        
        /* 复选框样式 */
        input[type="checkbox"] {
            accent-color: #667eea;
        }
    </style>
</head>
<body>

        <div class="content">
            <div class="info-box">
                <h4 id="usageTitle">📋 使用说明</h4>
                <ul id="usageList">
                    <li>上传你的.sb3项目文件</li>
                    <li>工具会自动检测项目内容</li>
                    <li>选择操作模式</li>
                    <li>选择要操作的内容</li>
                    <li>点击“执行并下载”修复后的新的.sb3文件</li>
                </ul>
            </div>

            <!-- 步骤1：上传文件 -->
            <div class="step">
                <h3 id="step1Title">📁 步骤1：上传SB3文件</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="sb3File" accept=".sb3">
                    <label for="sb3File" class="file-input-label">
                        <div class="icon">📦</div>
                        <div id="uploadText">点击或拖拽上传.sb3文件</div>
                    </label>
                </div>
            </div>

            <!-- 步骤2：选择操作模式 -->
            <div class="step" id="modeStep" style="display: none;">
                <h3 id="step2Title">⚙️ 步骤2：选择操作模式</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" id="modeDelete" onclick="setMode('delete')" style="flex: 1; min-width: 120px;">
                        🌀 <span id="modeDeleteText">更新扩展</span>
                    </button>
                    <button class="btn btn-secondary" id="modeReplaceURL" onclick="setMode('replaceURL')" style="flex: 1; min-width: 120px;">
                        🔗 <span id="modeReplaceURLText">替换扩展链接</span>
                    </button>
                    <button class="btn btn-secondary" id="modeReplaceID" onclick="setMode('replaceID')" style="flex: 1; min-width: 120px;">
                        🆔 <span id="modeReplaceIDText">替换扩展ID</span>
                    </button>
                    <button class="btn btn-secondary" id="modeConvertTW" onclick="setMode('convertTW')" style="flex: 1; min-width: 150px;">
                        🔄 <span id="modeConvertTWText">Gandi转TurboWarp</span>
                    </button>
                </div>
                
                <!-- 替换链接输入框 -->
                <div id="replaceURLInput" style="display: none;">
                    <label id="newURLLabel" style="display: block; margin-bottom: 8px; font-weight: 600;">🔗 新的扩展链接：</label>
                    <input type="text" id="newURL" placeholder="https://example.com/new-extension.js" 
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                </div>
                
                <!-- 替换ID输入框 -->
                <div id="replaceIDInput" style="display: none;">
                    <label id="newIDLabel" style="display: block; margin-bottom: 8px; font-weight: 600;">🆔 新的扩展ID：</label>
                    <input type="text" id="newID" placeholder="myExtension" 
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                </div>
            </div>

            <!-- 步骤3：选择要操作的扩展 -->
            <div class="step" id="extensionStep" style="display: none;">
                <h3 id="step3Title">🔌 步骤3：选择要操作的扩展</h3>
                <div id="extensionList" class="extension-list"></div>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="selectAll(true)" id="selectAllBtn">全选</button>
                    <button class="btn btn-secondary" onclick="selectAll(false)" id="selectNoneBtn">全不选</button>
                </div>
            </div>

            <!-- 步骤4：执行并下载 -->
            <div class="step" id="downloadStep" style="display: none;">
                <h3 id="step4Title">⬇️ 步骤4：执行并下载</h3>
                <div class="button-group">
                    <button class="btn btn-primary" id="updateBtn" onclick="executeAndDownload()">
                        🚀 <span id="executeBtnText">执行并下载新文件</span>
                    </button>
                    <button class="btn btn-secondary" onclick="downloadDebugInfo()" style="flex: 0.5;">
                        🐛 <span id="debugBtnText">下载调试信息</span>
                    </button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress" id="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
            </div>

            <!-- 状态信息 -->
            <div class="status" id="status"></div>
        </div>
    </div>

            try {
                sb3File = file;
                const zip = await JSZip.loadAsync(file);
                
                if (!zip.file('project.json')) {
                    throw new Error('无效的SB3文件：缺少project.json');

                const projectJson = await zip.file('project.json').async('string');

                detectExtensions();

                showStatus('error', '❌ ' + error.message);
